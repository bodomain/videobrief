{% extends "base.html" %}

{% block content %}
<div class="mb-6">
    <a href="/" class="text-blue-600 hover:text-blue-800 text-sm">← Zurück</a>
</div>

<div class="bg-white rounded-lg shadow-sm border p-6 mb-6">
    <h1 class="text-xl font-bold text-gray-800 mb-1">{{ job.title }}</h1>
    <p class="text-sm text-gray-500 mb-4">
        <a href="{{ job.url }}" target="_blank" class="hover:text-blue-600">{{ job.url }}</a>
    </p>

    <div id="job-status"
         hx-get="/jobs/{{ job.id }}/status"
         hx-trigger="{{ 'every 2s' if job.status == 'running' else 'none' }}"
         hx-swap="outerHTML">
        {% include "_status.html" %}
    </div>
</div>

{% if report %}
<div class="bg-white rounded-lg shadow-sm border p-6">
    <h2 class="text-lg font-semibold text-gray-800 mb-4">Report</h2>
    <div class="prose max-w-none text-gray-700">
        <pre class="whitespace-pre-wrap font-sans text-sm leading-relaxed">{{ report }}</pre>
    </div>
</div>
{% endif %}
{% endblock %}
